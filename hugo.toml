baseURL = "https://long-28.github.io/"
title = "AWS Portfolio Workshop"
theme = "hugo-theme-learn"
languageCode = "en-US"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true
enableRobotsTXT = true
summaryLength = 24

[params]
  themeVariant = "workshop"
  description = "Internship report, cloud project, and hands-on AWS workshop"
  author = "Võ Minh Long"
  showVisitedLinks = true
  disableBreadcrumb = false
  disableNextPrev = false

[languages]
  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    contentDir = "content/en"
    weight = 1
    title = "AWS Portfolio Workshop"
  [languages.vi]
    languageCode = "vi-VN"
    languageName = "Tiếng Việt"
    contentDir = "content/vi"
    weight = 2
    title = "Workshop Portfolio AWS"

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    style = "github-dark"
  [markup.goldmark.renderer]
    unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
